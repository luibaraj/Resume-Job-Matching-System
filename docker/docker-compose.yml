version: '3.8'

services:
  collection:
    build:
      context: ..
      dockerfile: docker/Dockerfile.collection
    container_name: job-collection
    environment:
      - DB_PATH=/data/jobs.db
      - GREENHOUSE_BOARD_TOKENS=${GREENHOUSE_BOARD_TOKENS}
      - REQUEST_TIMEOUT=30
      - MAX_RETRIES=3
      - RETRY_BACKOFF=2.0
      - LOG_LEVEL=INFO
    volumes:
      - ../data:/data
    networks:
      - job-pipeline
    restart: "no"

  preprocessing:
    build:
      context: ..
      dockerfile: docker/Dockerfile.preprocessing
    container_name: job-preprocessing
    environment:
      - DB_PATH=/data/jobs.db
      - LOG_LEVEL=INFO
    volumes:
      - ../data:/data
    networks:
      - job-pipeline
    depends_on:
      - collection
    restart: "no"

  extraction:
    build:
      context: ..
      dockerfile: docker/Dockerfile.extraction
    container_name: job-extraction
    environment:
      - DB_PATH=/data/jobs.db
      - EXTRACTION_MODEL_PATH=${EXTRACTION_MODEL_PATH}
      - EXTRACTION_CHUNK_SIZE=${EXTRACTION_CHUNK_SIZE:-50}
      - EXTRACTION_N_GPU_LAYERS=${EXTRACTION_N_GPU_LAYERS:--1}
      - LOG_LEVEL=INFO
    volumes:
      - ../data:/data
      - ${MODEL_HOST_PATH}:${EXTRACTION_MODEL_PATH}:ro
    networks:
      - job-pipeline
    depends_on:
      - preprocessing
    restart: "no"

networks:
  job-pipeline:
    driver: bridge

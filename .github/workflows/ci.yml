name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      DB_PATH: ":memory:"
      LOG_LEVEL: "WARNING"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short -k "not infra and not dag"

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push job-collection
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.collection
          tags: ghcr.io/${{ github.repository }}/job-collection:latest
          push: true

      - name: Build and push job-preprocessing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.preprocessing
          tags: ghcr.io/${{ github.repository }}/job-preprocessing:latest
          push: true

      - name: Build and push job-extraction
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.extraction
          tags: ghcr.io/${{ github.repository }}/job-extraction:latest
          push: true

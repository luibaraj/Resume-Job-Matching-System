name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      DB_PATH: ":memory:"
      LOG_LEVEL: "WARNING"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short -k "not infra and not dag"

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build job-collection
        run: docker build -f docker/Dockerfile.collection -t job-collection:latest .

      - name: Build job-preprocessing
        run: docker build -f docker/Dockerfile.preprocessing -t job-preprocessing:latest .

      - name: Build job-extraction
        run: docker build -f docker/Dockerfile.extraction -t job-extraction:latest .
